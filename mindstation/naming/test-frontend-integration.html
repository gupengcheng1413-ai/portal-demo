<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>前端集成测试</title>
</head>
<body>
<h1>前端集成测试</h1>
<button id="test1">测试1: 检查API加载</button>
<button id="test2">测试2: 调用fetchEnergyCard</button>
<button id="test3">测试3: 调用generateEnergyCard</button>
<pre id="log" style="background:#f5f5f5;padding:20px;min-height:300px;"></pre>

<script src="data/api.js"></script>
<script src="chpuka.js"></script>
<script>
const log = document.getElementById('log');
function addLog(msg) {
  log.textContent += msg + '\n';
  console.log(msg);
}

document.getElementById('test1').addEventListener('click', () => {
  log.textContent = '';
  addLog('=== 测试1: 检查API加载 ===');
  addLog('NAMING_DATA存在: ' + !!window.NAMING_DATA);
  addLog('fetchEnergyCard存在: ' + !!window.NAMING_DATA?.fetchEnergyCard);
  addLog('__NM_generateEnergyCard存在: ' + !!window.__NM_generateEnergyCard);
});

document.getElementById('test2').addEventListener('click', async () => {
  log.textContent = '';
  addLog('=== 测试2: 调用fetchEnergyCard ===');
  
  if (!window.NAMING_DATA?.fetchEnergyCard) {
    addLog('错误: fetchEnergyCard不存在');
    return;
  }
  
  try {
    addLog('调用中...');
    const result = await window.NAMING_DATA.fetchEnergyCard('雷军', '2024-06-25');
    addLog('结果: ' + JSON.stringify(result, null, 2));
  } catch (err) {
    addLog('错误: ' + err.message);
  }
});

document.getElementById('test3').addEventListener('click', async () => {
  log.textContent = '';
  addLog('=== 测试3: 调用generateEnergyCard ===');
  
  if (!window.__NM_generateEnergyCard) {
    addLog('错误: __NM_generateEnergyCard不存在');
    return;
  }
  
  try {
    addLog('调用中...');
    const result = await window.__NM_generateEnergyCard('雷军');
    addLog('结果: ' + JSON.stringify(result, null, 2));
  } catch (err) {
    addLog('错误: ' + err.message);
  }
});
</script>
</body>
</html>
