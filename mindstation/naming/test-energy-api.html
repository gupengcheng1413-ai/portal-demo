<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>能量卡API测试</title>
</head>
<body>
<h1>能量卡API测试</h1>

<div>
  <label>姓名: <input id="nameInput" value="雷军"></label>
  <label>日期: <input id="dateInput" value="2024-06-25"></label>
  <button id="testBtn">测试API</button>
</div>

<h2>结果：</h2>
<pre id="result" style="background:#f5f5f5;padding:20px;"></pre>

<script>
const API_URL = 'https://t-mvp-liefcrkzog.cn-hangzhou.fcapp.run/energy-card';

document.getElementById('testBtn').addEventListener('click', async () => {
  const name = document.getElementById('nameInput').value;
  const date = document.getElementById('dateInput').value;
  const result = document.getElementById('result');

  result.textContent = '请求中...';

  try {
    const url = `${API_URL}?name=${encodeURIComponent(name)}&date=${date}`;
    console.log('请求URL:', url);

    const response = await fetch(url);
    console.log('响应状态:', response.status);

    const data = await response.json();
    console.log('响应数据:', data);

    result.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    console.error('错误:', err);
    result.textContent = '错误: ' + err.message;
  }
});

// 自动测试
document.getElementById('testBtn').click();
</script>
</body>
</html>
