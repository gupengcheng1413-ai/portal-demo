<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>心灵驿站 · 每日星语</title>
<link rel="preconnect" href="https://lf26-cdn-tos.bytecdntp.com">
<link href="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/lxgw-wenkai-webfont/1.6.0/lxgwwenkai-regular.min.css" rel="stylesheet">
<link href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/lxgw-wenkai-webfont/1.6.0/lxgwwenkaitc-regular.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="stage">
<div class="device" id="device">

  <!-- 全局氛围 canvas（仅 daily / overlay 等夜空场景显示） -->
  <canvas class="starfield" id="starfield" width="1640" height="348" aria-hidden="true"></canvas>

  <!-- ============== 1. 首页 home（整张 Figma 画布做背景，叠 4 个透明热区） ============== -->
  <section class="scene scene-home" data-scene="home">
    <img class="home-bg" src="daily-words/assets/illustrations/home-bg.png" alt="" draggable="false">
    <button type="button" class="home-portal-back" id="portalBack" aria-label="返回主页">‹</button>
    <button type="button" class="hcard hcard-1" data-card="answer" aria-label="灵感锦囊"></button>
    <img class="hcard-1-cover" src="answer-book/home-card-answer.png" alt="" draggable="false">
    <button type="button" class="hcard hcard-2" data-card="star" aria-label="每日星语"></button>
    <button type="button" class="hcard hcard-3" data-card="personality" aria-label="性格认知"></button>
    <img class="hcard-3-cover" src="personality/assets/home-card-personality.png" alt="" draggable="false">
    <button type="button" class="hcard hcard-4" data-card="naming" aria-label="姓名寓意"></button>
    <img class="hcard-4-cover" src="naming/assets/home-card-naming.png" alt="" draggable="false">
  </section>

  <!-- ============== 2. 未绑定 unbound（整张 Figma 画布做背景，叠 2 个透明热区） ============== -->
  <section class="scene scene-unbound" data-scene="unbound" hidden>
    <img class="unb-bg-img" src="daily-words/assets/illustrations/unbound-bg.png" alt="" draggable="false" loading="lazy">
    <button type="button" class="hot hot-back" data-go="home" aria-label="返回"></button>
    <button type="button" class="hot hot-cta" data-go="select" aria-label="去选择"></button>
  </section>

  <!-- ============== 2b. 已绑定提示 reminder（按 Figma 4092:70，整图 1:1，无动效） ============== -->
  <section class="scene scene-reminder" data-scene="reminder" hidden>
    <img class="rm-bg" src="daily-words/assets/illustrations/reminder-bg.png" alt="" draggable="false" loading="lazy">
    <!-- 3 个透明热区：左上返回 / 右上"我的收藏"胶囊 (1404,15 218×60) / 中部"去查看" CTA (980,201 340×77) -->
    <button type="button" class="hot hot-back" data-go="home" aria-label="返回"></button>
    <button type="button" class="hot hot-fav" data-go="collect" aria-label="我的收藏"></button>
    <button type="button" class="hot hot-cta" data-go="daily" aria-label="去查看"></button>
  </section>

  <!-- ============== 3. 星座选择 select（按 Figma 3912:495 + 4228:11；整张 PNG 1:1 还原） ============== -->
  <section class="scene scene-select" data-scene="select" hidden>
    <div class="sel-scroll" id="selectTrack">
      <img class="sel-bg" src="daily-words/assets/illustrations/select-bg.png" alt="" draggable="false" loading="lazy">
      <!-- 遮掉 Figma 整图里画死的右上对号（避免滚动时下方跟随出现一个对号） -->
      <span class="sel-bg-mask" aria-hidden="true"></span>
      <!-- 12 张选中态 chip：每个星座各自一张（从 Figma 3912:495 切出，含 #383b42 灰底覆盖默认图标） -->
      <img class="zhot-on" data-for="aries"       src="daily-words/assets/illustrations/chips/aries.png"       alt="" hidden style="left:131px;top:154px" loading="lazy">
      <img class="zhot-on" data-for="leo"         src="daily-words/assets/illustrations/chips/leo.png"         alt="" hidden style="left:629px;top:154px" loading="lazy">
      <img class="zhot-on" data-for="sagittarius" src="daily-words/assets/illustrations/chips/sagittarius.png" alt="" hidden style="left:1127px;top:154px" loading="lazy">
      <img class="zhot-on" data-for="taurus"      src="daily-words/assets/illustrations/chips/taurus.png"      alt="" hidden style="left:131px;top:322px" loading="lazy">
      <img class="zhot-on" data-for="virgo"       src="daily-words/assets/illustrations/chips/virgo.png"       alt="" hidden style="left:629px;top:322px" loading="lazy">
      <img class="zhot-on" data-for="capricorn"   src="daily-words/assets/illustrations/chips/capricorn.png"   alt="" hidden style="left:1127px;top:322px" loading="lazy">
      <img class="zhot-on" data-for="gemini"      src="daily-words/assets/illustrations/chips/gemini.png"      alt="" hidden style="left:131px;top:490px" loading="lazy">
      <img class="zhot-on" data-for="libra"       src="daily-words/assets/illustrations/chips/libra.png"       alt="" hidden style="left:629px;top:490px" loading="lazy">
      <img class="zhot-on" data-for="aquarius"    src="daily-words/assets/illustrations/chips/aquarius.png"    alt="" hidden style="left:1127px;top:490px" loading="lazy">
      <img class="zhot-on" data-for="cancer"      src="daily-words/assets/illustrations/chips/cancer.png"      alt="" hidden style="left:131px;top:658px" loading="lazy">
      <img class="zhot-on" data-for="scorpio"     src="daily-words/assets/illustrations/chips/scorpio.png"     alt="" hidden style="left:629px;top:658px" loading="lazy">
      <img class="zhot-on" data-for="pisces"      src="daily-words/assets/illustrations/chips/pisces.png"      alt="" hidden style="left:1127px;top:658px" loading="lazy">
      <!-- 12 个透明热区（按卡片整体 482×90 给点击区） -->
      <button type="button" class="zhot" style="left:80px;top:138px"   data-zo="aries"      aria-label="白羊座"></button>
      <button type="button" class="zhot" style="left:578px;top:138px"  data-zo="leo"        aria-label="狮子座"></button>
      <button type="button" class="zhot" style="left:1076px;top:138px" data-zo="sagittarius" aria-label="射手座"></button>
      <button type="button" class="zhot" style="left:80px;top:306px"   data-zo="taurus"     aria-label="金牛座"></button>
      <button type="button" class="zhot" style="left:578px;top:306px"  data-zo="virgo"      aria-label="处女座"></button>
      <button type="button" class="zhot" style="left:1076px;top:306px" data-zo="capricorn"  aria-label="摩羯座"></button>
      <button type="button" class="zhot" style="left:80px;top:474px"   data-zo="gemini"     aria-label="双子座"></button>
      <button type="button" class="zhot" style="left:578px;top:474px"  data-zo="libra"      aria-label="天秤座"></button>
      <button type="button" class="zhot" style="left:1076px;top:474px" data-zo="aquarius"   aria-label="水瓶座"></button>
      <button type="button" class="zhot" style="left:80px;top:642px"   data-zo="cancer"     aria-label="巨蟹座"></button>
      <button type="button" class="zhot" style="left:578px;top:642px"  data-zo="scorpio"    aria-label="天蝎座"></button>
      <button type="button" class="zhot" style="left:1076px;top:642px" data-zo="pisces"     aria-label="双鱼座"></button>
    </div>
    <header class="sel-topbar">
      <button type="button" class="sel-back" aria-label="返回" data-go="back">
        <svg viewBox="0 0 12 22" width="10" height="18"><path d="M11 1 L1 11 L11 21" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="sel-confirm" id="selConfirm" aria-label="确定" disabled>
        <img src="daily-words/assets/illustrations/check.png" alt="" draggable="false">
      </button>
    </header>
    <span class="sel-scroll-hint" aria-hidden="true">↓ 下滑查看更多</span>
  </section>

  <!-- ============== 4. loading ============== -->
  <section class="scene scene-loading" data-scene="loading" hidden>
    <header class="topbar topbar-dark">
      <span class="back-btn back-btn-quiet" aria-hidden="true">
        <svg viewBox="0 0 12 22" width="10" height="18"><path d="M11 1 L1 11 L11 21" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <h1 class="topbar-title">每日星语</h1>
    </header>

    <div class="ld-illu" aria-hidden="true">
      <img class="ld-egg" src="daily-words/assets/illustrations/egg-loading.png" alt="" loading="lazy">
      <span class="ld-orbit ld-orbit-1"></span>
      <span class="ld-orbit ld-orbit-2"></span>
      <span class="ld-orbit ld-orbit-3"></span>
      <span class="ld-twinkle ld-tw-1"></span>
      <span class="ld-twinkle ld-tw-2"></span>
      <span class="ld-twinkle ld-tw-3"></span>
    </div>

    <div class="ld-bar"><div class="ld-bar-fill" id="loadFill"></div></div>
    <p class="ld-hint">正在加载中，请稍候...</p>
  </section>

  <!-- ============== 6. 每日星语主页 daily（按 Figma 4238:150 狮子 / 4238:410 金牛，整图 1:1，无动效） ============== -->
  <section class="scene scene-daily" data-scene="daily" hidden>
    <div class="daily-scroll" id="dailyScroll">
      <img class="daily-bg" id="dailyBg" src="daily-words/assets/illustrations/daily-leo-bg.png" alt="" draggable="false" loading="lazy">

      <!-- 日期显示（右上角） -->
      <img class="daily-date-icon" src="daily-words/assets/illustrations/date-icon.svg" alt="" draggable="false">
      <div class="daily-date" id="dailyDate">6月11日</div>

      <!-- 星语标题（居左显示） -->
      <h2 class="daily-title" id="dailyTitle">步履从容深耕自有收获</h2>

      <!-- 顶部 2 个透明热区：左上返回 → reminder / 右上"星座名"胶囊 Group 156 → select -->
      <button type="button" class="daily-hot daily-hot-back" id="dailyBack" data-go="reminder" aria-label="返回"></button>
      <button type="button" class="daily-hot daily-hot-zo"   data-go="select" aria-label="切换星座"></button>

      <!-- 底部一个收藏按钮（按 Figma Group 228 / Group 229 切换 src） -->
      <button type="button" class="daily-fav" id="favBtn" aria-label="收藏" aria-pressed="false">
        <img id="favBtnImg" src="daily-words/assets/illustrations/fav-off.png" alt="" draggable="false" loading="lazy">
      </button>
    </div>
    <span class="scroll-hint" id="scrollHint">↓ 下滑查看星愿 Buff</span>
  </section>

  <!-- ============== 7. 我的收藏 collect（Figma 3944:479 1:1，DOM 渲染按实际数量） ============== -->
  <section class="scene scene-collect" data-scene="collect" hidden>
    <!-- 顶栏：Group 152 返回 (0,1 80×68) + "我的收藏"标题 (80,12) -->
    <button type="button" class="cl-back" data-go="reminder" aria-label="返回">
      <img src="daily-words/assets/illustrations/cl-back.svg" alt="" draggable="false">
    </button>
    <h1 class="cl-title">我的收藏</h1>
    <!-- 删除按钮：image 4 (1578,281 46×47) -->
    <button type="button" class="cl-trash" id="trashBtn" aria-label="批量删除">
      <img src="daily-words/assets/illustrations/cl-trash.png" alt="" draggable="false">
    </button>

    <!-- 卡片容器：DOM 渲染按实际 state.collect 长度展示 -->
    <div class="cl-cards" id="colList"><!-- JS 渲染 --></div>

    <!-- 空状态 -->
    <div class="col-empty" id="colEmpty" hidden>
      <img src="daily-words/assets/illustrations/empty-egg.png" alt="" aria-hidden="true">
      <p>还没有收藏的内容</p>
    </div>
  </section>

  <!-- ============== 8. 删除确认 overlay ============== -->
  <section class="scene scene-confirm" data-scene="confirm" hidden>
    <div class="conf-mask"></div>
    <h2 class="conf-text">确定要删除这<span id="confCount">三</span>条星语吗？</h2>
    <div class="conf-btns">
      <button type="button" class="cta-ghost" data-conf="cancel">取消</button>
      <button type="button" class="cta-primary" data-conf="ok">确认</button>
    </div>
  </section>

  <!-- ============== 9. 灵感锦囊 answer（集成 v1/answer-book 子项目，1640×348 同尺寸 iframe） ============== -->
  <section class="scene scene-answer" data-scene="answer" hidden>
    <iframe class="ans-frame" id="ansFrame" title="灵感锦囊" src="about:blank" frameborder="0"></iframe>
    <button type="button" class="ans-back" data-go="home" aria-label="返回首页">
      <svg viewBox="0 0 12 22" width="10" height="18"><path d="M11 1 L1 11 L11 21" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </section>

  <!-- ============== 10. 性格认知 personality（集成 v1/personality 子项目，1640×348 同尺寸 iframe） ============== -->
  <section class="scene scene-personality" data-scene="personality" hidden>
    <iframe class="per-frame" id="perFrame" title="性格认知" src="about:blank" frameborder="0"></iframe>
  </section>

  <!-- ============== 11. 姓名寓意 naming（集成 v1/naming 子项目，1640×348 同尺寸 iframe） ============== -->
  <section class="scene scene-naming" data-scene="naming" hidden>
    <iframe class="nam-frame" id="namFrame" title="姓名寓意" src="about:blank" frameborder="0"></iframe>
  </section>

  <!-- 顶部 toast -->
  <div class="toast" id="toast" aria-live="polite"></div>

</div><!-- /device -->
</div><!-- /stage -->

<script src="app.js"></script>
</body>
</html>
