<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1640, initial-scale=1.0">
  <title>句子讲解 Demo</title>
  <meta name="description" content="5.6寸长条屏(1640×348)英语句子讲解交互演示 — 由 Figma Make 导出忠实还原为纯 HTML/CSS/JS">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="viewport-container">
      <!-- 物理屏幕：1640×348，溢出裁剪 -->
      <div class="screen-container">
        <!-- 滚动包装器：填满屏幕，纵向滚动由 JS 按内容高度开关 -->
        <div class="scroll-wrapper" id="scrollWrapper">
          <!-- 内容帧：显式高度，使 calc(50%) / 百分比定位与源稿一致解析 -->
          <div class="content-frame" id="contentFrame"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 共享状态与常量 -->
  <script src="js/state.js"></script>

  <!-- 页面渲染器：每个文件向 window.PAGES 注册一个渲染函数 -->
  <script src="js/pages/juzi-shouye.js"></script>
  <script src="js/pages/scan.js"></script>
  <script src="js/pages/result-book.js?v=1782263919"></script>
  <script src="js/pages/lishi.js"></script>
  <script src="js/pages/jianjie.js"></script>
  <script src="js/pages/chooes-3.js"></script>
  <script src="js/pages/yinwen-chaci.js"></script>
  <script src="js/pages/hunhe.js"></script>
  <script src="js/pages/result-ai.js?v=1719216200"></script>
  <!-- result-the1/2/3.js 已废弃：新版 result-the 直接使用图片，不再调用这些函数 -->
  <script src="js/pages/result-the.js?v=1719306300"></script>
  <script src="js/pages/result-split.js"></script>

  <!-- 路由 / 历史栈 / 事件委托 / 热区 -->
  <script src="js/app.js?v=1719305100"></script>
</body>
</html>
